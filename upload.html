<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo Protocol | Upload</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .en-content { display: none; }
        body.lang-en .zh-content { display: none; }
        body.lang-en .en-content { display: block; }
    </style>
</head>
<body class="bg-gray-950 text-gray-300 font-sans h-screen flex overflow-hidden transition-colors duration-300">

    <aside class="w-64 bg-gray-900 border-r border-gray-800 flex flex-col hidden md:flex">
        <div class="p-6 border-b border-gray-800">
            <h1 class="text-2xl font-bold text-blue-500 tracking-wider">ECHO<span class="text-gray-100">APP</span></h1>
            <p class="text-xs text-gray-500 mt-1"><span class="zh-content">计算流动性层 v0.1</span><span class="en-content">Liquidity Layer v0.1</span></p>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <a href="app.html" class="flex items-center px-4 py-3 text-gray-400 hover:bg-gray-800 rounded-lg transition-colors">
                <span class="zh-content">Agent 宏观任务面板</span><span class="en-content">Agent Task Dashboard</span>
            </a>
            <a href="market.html" class="flex items-center px-4 py-3 text-gray-400 hover:bg-gray-800 rounded-lg transition-colors">
                <span class="zh-content">Echo 语义 API 市场</span><span class="en-content">Echo Semantic API</span>
            </a>
            <a href="upload.html" class="flex items-center px-4 py-3 bg-blue-600/10 text-blue-400 rounded-lg">
                <span class="zh-content">开发者算法上架</span><span class="en-content">Developer Upload</span>
            </a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden bg-gray-950">
        <header class="h-16 border-b border-gray-800 flex items-center px-6 justify-between bg-gray-900/50">
            <h2 class="text-lg font-semibold text-gray-200">
                <span class="zh-content">开发者上架中心</span><span class="en-content">Developer Portal</span>
            </h2>
            <div class="flex items-center space-x-4">
                <a href="index.html" class="text-gray-400 hover:text-white text-sm">
                    <span class="zh-content">&larr; 返回官网</span><span class="en-content">&larr; Home</span>
                </a>
                <button onclick="document.body.classList.toggle('lang-en')" class="px-3 py-1 bg-gray-800 hover:bg-gray-700 border border-gray-600 text-white rounded font-bold transition-all">EN / 中</button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8">
            <div class="max-w-4xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-8">
                
                <div class="bg-gray-900 rounded-xl border border-gray-800 p-6 shadow-lg space-y-6">
                    <div>
                        <label class="block text-sm text-gray-400 mb-2 font-medium"><span class="zh-content">算法语义标签</span><span class="en-content">Semantic Metadata</span></label>
                        <textarea rows="3" class="w-full bg-gray-950 border border-gray-700 rounded-lg p-3 text-sm text-gray-200 focus:outline-none focus:border-blue-500" placeholder="描述算法能力..."></textarea>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-2 font-medium"><span class="zh-content">硬件执行环境</span><span class="en-content">Execution Env</span></label>
                        <select class="w-full bg-gray-950 border border-gray-700 rounded-lg p-3 text-sm text-gray-200">
                            <option>AWS Nitro Enclave</option>
                        </select>
                    </div>
                    <div class="bg-green-900/20 border border-green-800/50 rounded-lg p-4 flex justify-between">
                        <span class="text-sm text-green-400">开发者分成比例 (Royalty)</span>
                        <span class="text-sm font-bold text-green-400">97.5%</span>
                    </div>
                </div>

                <div class="bg-gray-900 rounded-xl border border-gray-800 p-6 shadow-lg flex flex-col items-center justify-center text-center hover:border-blue-500 transition-colors cursor-pointer border-dashed border-2">
                    <div class="w-16 h-16 bg-blue-900/30 rounded-full flex items-center justify-center mb-4 text-blue-500">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                    </div>
                    <p class="text-white font-bold mb-2"><span class="zh-content">拖拽代码或权重文件</span><span class="en-content">Drop Code / Weights</span></p>
                    <p class="text-xs text-gray-500 mb-6">.py, .pth, .onnx</p>
                    <button class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-lg shadow-lg transition-all w-full">
                        <span class="zh-content">生成密码学证明 (ZK-POP)</span><span class="en-content">Generate ZK-POP</span>
                    </button>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
