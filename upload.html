<div id="uploadUI" class="flex-1 flex flex-col items-center justify-center text-center cursor-pointer" onclick="document.getElementById('fileInput').click()">
    <input type="file" id="fileInput" class="hidden" accept=".py,.pth,.onnx">
    <div class="w-16 h-16 bg-blue-900/30 rounded-full flex items-center justify-center mb-6 text-blue-500">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
    </div>
    <p class="text-white font-bold mb-2">
        <span class="zh-content" id="fileNameDisplay">点击选择源代码 / 权重文件</span>
        <span class="en-content">Click to select Source / Weights</span>
    </p>
    <button id="deployBtn" class="mt-8 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-lg transition-all w-full">
        <span class="zh-content">部署并生成 ZK-POP 证明</span><span class="en-content">Deploy & Generate ZKP</span>
    </button>
</div>

<script>
    // 监听文件选择，更新 UI 显示文件名
    document.getElementById('fileInput').addEventListener('change', function(e) {
        if(e.target.files.length > 0) {
            document.getElementById('fileNameDisplay').innerText = "已选择: " + e.target.files[0].name;
            document.getElementById('fileNameDisplay').classList.add("text-green-400");
        }
    });

    document.getElementById('deployBtn').addEventListener('click', async function(e) {
        e.stopPropagation(); // 防止触发外层的点击选择文件
        const btn = this;
        const fileInput = document.getElementById('fileInput');
        
        if (fileInput.files.length === 0) {
            alert("请先选择要上传的算法文件！");
            return;
        }

        const meta = document.getElementById('metaInput').value || "No Description";
        const env = document.getElementById('envInput').value;
        
        btn.disabled = true;
        btn.innerHTML = '正在读取文件并加密传输...';
        btn.classList.add('animate-pulse');

        // 真实构建文件表单 (Multipart/form-data)
        const formData = new FormData();
        formData.append("file", fileInput.files[0]);
        formData.append("metadata", meta);
        formData.append("environment", env);

        try {
            const response = await fetch('/api/upload', {
                method: 'POST',
                body: formData // 发送真实文件！
            });
            
            if (response.ok) {
                const respData = await response.json();
                const realData = respData.data;
                
                document.getElementById('uploadUI').classList.add('hidden');
                document.getElementById('successUI').classList.remove('hidden');
                document.getElementById('successUI').classList.add('flex');
                
                // 渲染基于物理文件生成的真实 Hash
                document.getElementById('modelIdDisplay').innerText = realData.model_id + " (" + realData.file_name + ")";
                document.getElementById('zkHashDisplay').innerText = realData.zk_pop_hash;
                document.getElementById('metricsDisplay').innerText = `Sharpe ${realData.certified_metrics.sharpe_ratio}`;
            } else {
                alert("上传失败，请检查网络。");
                btn.disabled = false;
                btn.classList.remove('animate-pulse');
            }
        } catch(err) {
            console.error(err);
        }
    });
</script>
